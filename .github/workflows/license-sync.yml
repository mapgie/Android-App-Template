name: Licence screen sync check

on:
  pull_request:
    branches: [main]
    paths:
      - "gradle/libs.versions.toml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if LicensesScreen.kt was not updated
        run: |
          # Only enforce this check once the app has a LicensesScreen.
          # If none exists yet, skip silently — the guard activates automatically
          # the moment the file is created.
          if ! find . -name "LicensesScreen.kt" -not -path "*/.git/*" -not -path "*/build/*" | grep -q .; then
            echo "No LicensesScreen.kt found — skipping. Create one when you implement library attribution."
            exit 0
          fi
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -q "LicensesScreen.kt"; then
            echo "LicensesScreen.kt updated alongside libs.versions.toml — good."
          else
            echo "::error::gradle/libs.versions.toml changed but LicensesScreen.kt was not updated. Add or remove the library attribution in your LicensesScreen."
            exit 1
          fi
