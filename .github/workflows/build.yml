name: Build & Release APK
on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle.kts"
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/**"
      - "gradle.properties"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    uses: mapgie/android-Actions/.github/workflows/android-build-release.yml@dd75ec70a809295343d167556395fc3cfddb0242
    with:
      # Apps generated from this template should change "MyApp" to their
      # own display name (used for the APK filename and release title).
      app-name: MyApp
