name: Release

# Fires when a version tag is pushed, e.g. git push origin v0.4.0-beta.1
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Strip the leading "v" so it matches the CHANGELOG entry, e.g. v0.4.0-beta.1 → 0.4.0-beta.1
      - name: Strip tag prefix
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Pulls the body of the matching ## [x.y.z] section from CHANGELOG.md
      - name: Extract changelog section
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          python3 - << 'PYEOF'
          import re, os, sys
          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              content = f.read()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, content, re.DOTALL)
          if not m:
              print(f"Warning: no changelog entry found for {version}", file=sys.stderr)
              notes = ""
          else:
              notes = m.group(1).strip()
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("notes<<NOTES_EOF\n")
              out.write(notes + "\n")
              out.write("NOTES_EOF\n")
          PYEOF

      # To use a production keystore, add these four repository secrets:
      #   SIGNING_KEY            — base64-encoded .jks / .keystore file
      #   KEY_STORE_PASSWORD     — keystore password
      #   KEY_ALIAS              — key alias
      #   KEY_PASSWORD           — key password
      # Without them the checked-in debug keystore is used (fine for template testing,
      # not for Play Store distribution).
      - name: Build release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > keystore.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore.jks" \
              -Pandroid.injected.signing.store.password="$KEY_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/debug.keystore" \
              -Pandroid.injected.signing.store.password="android" \
              -Pandroid.injected.signing.key.alias="androiddebugkey" \
              -Pandroid.injected.signing.key.password="android"
          fi

      - name: Locate and rename APK
        id: apk
        run: |
          src=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          dest="app/build/outputs/apk/release/MyApp-${{ github.ref_name }}.apk"
          mv "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      # Tags containing "-" (e.g. -beta.1) are marked as pre-release automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.apk.outputs.path }}
